<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="kryros_mobile">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>kryros_mobile</title>
  <link rel="manifest" href="manifest.json">
  <script src="firebase-config.js" defer></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Register Firebase service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('firebase-messaging-sw.js')
        .then((registration) => {
          console.log('Firebase Service Worker registered:', registration);
        })
        .catch((error) => {
          console.error('Firebase Service Worker registration failed:', error);
        });
    }

    // Initialize Firebase when page loads
    window.addEventListener('load', async () => {
      try {
        // Import Firebase config
        const { requestPermission, onMessageListener } = await import('./firebase-config.js');

        // Request notification permission and get token
        const token = await requestPermission();
        if (token) {
          console.log('FCM Token:', token);
          // Send token to Flutter app or backend
          if (window.setFCMToken) {
            window.setFCMToken(token);
          } else {
            localStorage.setItem('fcm_token', token);
          }
        }

        // Listen for foreground messages
        onMessageListener().then((payload) => {
          console.log('Foreground message received:', payload);
          // Show notification or update UI
          if (Notification.permission === 'granted') {
            new Notification(payload.notification?.title || 'KRYROS', {
              body: payload.notification?.body,
              icon: '/icons/Icon-192.png',
              data: payload.data
            });
          }
        });
      } catch (error) {
        console.error('Firebase initialization error:', error);
      }
    });
  </script>
</body>
</html>
