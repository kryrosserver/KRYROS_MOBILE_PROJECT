services:
  - type: web
    name: kryros-backend
    env: node
    region: oregon
    rootDir: Backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && npm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_SEED_EMAIL
        sync: false
      - key: ADMIN_SEED_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=384
      - key: CORS_ORIGINS
        value: https://kryros.onrender.com,https://kryrosadminpanel.onrender.com
      - key: FRONTEND_URL
        value: https://kryros.onrender.com

  - type: web
    name: kryros-user-ui
    env: node
    region: oregon
    rootDir: Frontend/User-UI
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://kryrosbackend.onrender.com/api
      - key: NODE_OPTIONS
        value: --max-old-space-size=384
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"

  - type: web
    name: kryros-admin
    env: node
    region: oregon
    rootDir: Frontend/Admi-Panel
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://kryrosbackend.onrender.com/api
      - key: NODE_OPTIONS
        value: --max-old-space-size=384
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
