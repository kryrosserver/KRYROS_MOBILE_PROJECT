services:
  - type: web
    name: kryros-backend
    env: node
    region: oregon
    buildCommand: cd Backend && npm install && npx prisma generate
    startCommand: cd Backend && npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kryros-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: kryros-user-ui
    env: node
    region: oregon
    buildCommand: cd Frontend/User-UI && npm install && npm run build
    startCommand: cd Frontend/User-UI && npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://kryros-backend.onrender.com
    routes:
      - path: /
        destination: kryros-user-ui

  - type: web
    name: kryros-admin
    env: node
    region: oregon
    buildCommand: cd Frontend/Admin-Panel && npm install && npm run build
    startCommand: cd Frontend/Admin-Panel && npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://kryros-backend.onrender.com
